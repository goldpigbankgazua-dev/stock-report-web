<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>옐리니 보드</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23f5c518'/><text x='16' y='23' font-size='19' font-weight='800' text-anchor='middle' fill='%231d2127' font-family='sans-serif'>Y</text></svg>" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<style>
  :root{
    --bg:#f7f6f1; --panel:#ffffff; --ink:#1d2127; --muted:#6b7280;
    --line:#ece8db; --accent:#c08a00; --accent-soft:#fdf3c4;
    --mark:#ffe066; --us:#1d8a5b; --kr:#c0392b; --shadow:0 1px 3px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#13110b; --panel:#1b1810; --ink:#ece9e0; --muted:#a39c88;
      --line:#2c2819; --accent:#facc15; --accent-soft:#3a330f;
      --mark:#6b5e16; --shadow:0 1px 3px rgba(0,0,0,.4);
    }
    mark{color:#fff !important;}
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    line-height:1.65;}
  header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);
    padding:14px 20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;box-shadow:var(--shadow);}
  header{border-top:3px solid var(--accent);}
  header h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:9px;}
  .logo{width:30px;height:30px;flex:none;display:block;}
  header .sub{color:var(--muted);font-size:12.5px;}
  #search{flex:1;min-width:220px;margin-left:auto;padding:10px 14px;border:1px solid var(--line);
    border-radius:10px;background:var(--bg);color:var(--ink);font-size:14px;outline:none;}
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .wrap{display:grid;grid-template-columns:320px 1fr;gap:18px;max-width:1180px;margin:18px auto;padding:0 18px;}
  @media (max-width:820px){ .wrap{grid-template-columns:1fr;} }
  .list{display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px;
    cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
  .card:hover{border-color:var(--accent);transform:translateY(-1px);}
  .card.active{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .card .top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .tk{font-weight:800;font-size:15px;}
  .badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px;color:#fff;}
  .badge.US{background:var(--us);} .badge.KR{background:var(--kr);}
  .card .co{color:var(--muted);font-size:12.5px;}
  .card .hl{font-size:12.5px;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card .dt{color:var(--muted);font-size:11px;margin-top:6px;}
  .report{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px 30px;
    box-shadow:var(--shadow);min-height:60vh;}
  .empty{color:var(--muted);text-align:center;padding:60px 20px;}
  .empty code{background:var(--accent-soft);color:var(--accent);padding:3px 8px;border-radius:6px;font-weight:700;}
  /* rendered markdown */
  .report h1{font-size:22px;line-height:1.35;margin:.1em 0 .2em;letter-spacing:-.4px;}
  .report h2{font-size:17px;margin:1.6em 0 .5em;padding-top:.6em;border-top:1px solid var(--line);}
  .report h3{font-size:13.5px;color:var(--muted);font-weight:600;margin:.2em 0 1em;}
  .report p{margin:.5em 0;}
  .report ul{padding-left:1.1em;} .report li{margin:.25em 0;}
  .report strong{font-weight:800;}
  .report mark{background:var(--mark);padding:0 3px;border-radius:3px;}
  .report table{border-collapse:collapse;width:100%;margin:.6em 0;font-size:13px;}
  .report th,.report td{border:1px solid var(--line);padding:7px 10px;text-align:left;}
  .report th{background:var(--accent-soft);font-weight:700;}
  .report tr:nth-child(even) td{background:rgba(125,125,125,.04);}
  .report hr{border:none;border-top:1px solid var(--line);margin:1.4em 0;}
  .report blockquote{border-left:3px solid var(--line);margin:.6em 0;padding:.2em 0 .2em 14px;color:var(--muted);}
  footer{text-align:center;color:var(--muted);font-size:11.5px;padding:24px;}
  .count{color:var(--muted);font-size:12px;margin:2px 0 8px;}
  /* memo */
  .memo-btn{flex:none;padding:10px 13px;border:1px solid var(--accent);border-radius:10px;
    background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:13.5px;cursor:pointer;white-space:nowrap;}
  .memo-btn:hover{filter:brightness(.97);}
  .card .memo-dot{margin-left:auto;font-size:12px;line-height:1;}
  .memo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;visibility:hidden;transition:.2s;z-index:40;}
  .memo-overlay.open{opacity:1;visibility:visible;}
  .memo-drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-6px 0 28px rgba(0,0,0,.18);transform:translateX(100%);
    transition:transform .22s ease;z-index:50;display:flex;flex-direction:column;}
  .memo-drawer.open{transform:translateX(0);}
  .memo-hd{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line);
    border-top:3px solid var(--accent);}
  .memo-hd .t{font-weight:800;font-size:15px;}
  .memo-hd .x{margin-left:auto;border:none;background:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px;}
  .memo-tabs{display:flex;gap:6px;padding:12px 14px 0;}
  .memo-tab{flex:1;padding:8px;border:1px solid var(--line);border-radius:9px;background:var(--bg);
    color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;}
  .memo-tab.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
  .memo-body{flex:1;display:flex;flex-direction:column;padding:14px 16px 16px;gap:9px;}
  .memo-ctx{font-size:12.5px;color:var(--muted);}
  .memo-ctx b{color:var(--ink);font-size:14px;}
  .memo-ta{flex:1;min-height:220px;resize:none;width:100%;padding:13px;border:1px solid var(--line);border-radius:10px;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.65;font-family:inherit;outline:none;}
  .memo-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .memo-ta:disabled{opacity:.5;}
  .memo-status{font-size:11.5px;color:var(--muted);min-height:15px;}
  /* tabs + calendar */
  .tabs{display:flex;gap:8px;max-width:1180px;margin:14px auto 0;padding:0 18px;}
  .tab-btn{padding:9px 16px;border:1px solid var(--line);border-radius:10px;background:var(--panel);
    color:var(--muted);font-weight:800;font-size:13.5px;cursor:pointer;}
  .tab-btn.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
  .view{display:none;} .view.on{display:block;}
  .filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .fchip{padding:5px 11px;border:1px solid var(--line);border-radius:999px;background:var(--panel);
    color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;}
  .fchip.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
  .cal-wrap{max-width:1180px;margin:16px auto;padding:0 18px;}
  .cal-note{color:var(--muted);font-size:12px;margin-bottom:12px;}
  .cal-list{display:flex;flex-direction:column;gap:9px;}
  .cal-row{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:13px 16px;box-shadow:var(--shadow);}
  .cal-row.soon{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
  .cal-dday{flex:none;min-width:62px;text-align:center;font-weight:800;font-size:16px;color:var(--accent);}
  .cal-main{flex:1;min-width:0;}
  .cal-main .nm{font-weight:800;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .cal-main .sub{color:var(--muted);font-size:12px;margin-top:3px;}
  .cal-date{flex:none;text-align:right;font-size:12.5px;color:var(--muted);white-space:nowrap;}
  .chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;}
  .chip.confirmed{background:#e7f6ee;color:#1d8a5b;} .chip.tentative{background:#fdeebf;color:#a8730b;}
  .cal-links{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
  .cal-link{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;border:1px solid var(--accent);
    color:var(--accent);background:var(--accent-soft);cursor:pointer;}
  .cal-link.disabled{border-color:var(--line);color:var(--muted);background:var(--bg);cursor:default;}
  .type-badge{font-size:10px;font-weight:800;padding:1px 6px;border-radius:5px;border:1px solid var(--line);color:var(--muted);}
  .type-badge.preview{color:#a8730b;border-color:#e6c200;background:#fffbe6;}
  .type-badge.review{color:#2563eb;border-color:#9bb8ff;background:#eef3ff;}
  @media (max-width:560px){ .cal-date{display:none;} }
  /* sector view */
  .sec-wrap{max-width:1180px;margin:16px auto;padding:0 18px;}
  .sec-note{color:var(--muted);font-size:12px;margin-bottom:12px;}
  .sec-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);}
  .sec-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .sec-head .nm{font-weight:800;font-size:15.5px;}
  .sec-tickers{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto;}
  .sec-tk{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--bg);border:1px solid var(--line);color:var(--muted);cursor:pointer;}
  .sec-summary{color:var(--ink);font-size:13px;margin:9px 0 12px;line-height:1.6;}
  .sec-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media (max-width:640px){ .sec-split{grid-template-columns:1fr;} }
  .sec-col{border-radius:10px;padding:11px 13px;}
  .sec-col.good{background:rgba(29,138,91,.08);border:1px solid rgba(29,138,91,.3);}
  .sec-col.bad{background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.28);}
  .sec-col h4{margin:0 0 7px;font-size:12.5px;}
  .sec-col.good h4{color:#1d8a5b;} .sec-col.bad h4{color:#c0392b;}
  .sec-col ul{margin:0;padding-left:1.05em;} .sec-col li{font-size:12.5px;margin:.32em 0;line-height:1.5;}
  .sent{font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:999px;}
  .sent.pos{background:#e7f6ee;color:#1d8a5b;} .sent.neu{background:#fdeebf;color:#a8730b;} .sent.neg{background:#fde7e7;color:#c0392b;}
</style>
</head>
<body>
<header>
  <div>
    <h1><svg class="logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="2" y="2" width="28" height="28" rx="8" fill="#f5c518"/><rect x="6.5" y="19" width="19" height="5" rx="2.5" fill="#1d2127" opacity=".18"/><text x="16" y="21.5" font-size="17" font-weight="800" text-anchor="middle" fill="#1d2127" font-family="-apple-system,'Malgun Gothic',sans-serif">옐</text></svg>옐리니 보드</h1>
    <div class="sub">8단계 실적 분석 리포트 · 미국/한국 주식</div>
  </div>
  <input id="search" type="search" placeholder="티커·종목명 검색 (예: MU, 마이크론, 삼성전자)" autocomplete="off" />
  <button id="memoBtn" class="memo-btn" title="투자 메모 (Alt+M)">📝 메모</button>
</header>

<div class="tabs">
  <button class="tab-btn on" data-view="reports">📋 리포트</button>
  <button class="tab-btn" data-view="calendar">📅 실적 캘린더</button>
  <button class="tab-btn" data-view="sectors">🔭 섹터 뷰</button>
</div>

<div id="view-reports" class="view on">
<div class="wrap">
  <aside>
    <div class="filters" id="filters">
      <button class="fchip on" data-type="all">전체</button>
      <button class="fchip" data-type="earnings">실적</button>
      <button class="fchip" data-type="preview">프리뷰</button>
      <button class="fchip" data-type="review">리뷰</button>
    </div>
    <div class="count" id="count"></div>
    <div class="list" id="list"></div>
  </aside>
  <main class="report" id="report">
    <div class="empty">왼쪽에서 리포트를 선택하세요.</div>
  </main>
</div>
</div><!-- /view-reports -->

<div id="view-calendar" class="view">
  <div class="cal-wrap">
    <div class="cal-note" id="calNote"></div>
    <div class="cal-list" id="calList"></div>
  </div>
</div>

<div id="view-sectors" class="view">
  <div class="sec-wrap">
    <div class="sec-note" id="secNote"></div>
    <div id="secList"></div>
  </div>
</div>

<footer>정적 대시보드 · 새 종목은 Claude Code에서 <code>/stock-report &lt;티커&gt;</code> 로 생성 후 push</footer>

<div class="memo-overlay" id="memoOverlay"></div>
<aside class="memo-drawer" id="memoDrawer" aria-hidden="true">
  <div class="memo-hd">
    <span class="t">📝 투자 메모</span>
    <button class="x" id="memoClose" title="닫기">×</button>
  </div>
  <div class="memo-tabs">
    <button class="memo-tab on" data-tab="stock">📌 종목 메모</button>
    <button class="memo-tab" data-tab="free">🗒️ 자유 메모</button>
  </div>
  <div class="memo-body">
    <div class="memo-ctx" id="memoCtx"></div>
    <textarea class="memo-ta" id="memoTa" placeholder="투자 아이디어·매수 근거·목표가·리스크 등을 적어두세요. 자동 저장됩니다."></textarea>
    <div class="memo-status" id="memoStatus"></div>
  </div>

# 아마존(AMZN) | Q2 2026 실적 프리뷰 — 시장이 보는 기대 vs 우려
### 2026-07-31 실적발표 예정 · 프리뷰(발표 전)

## 세줄 요약 (관전 포인트)
1. <mark>회사 가이던스는 Q2 매출 **$194~199B(YoY +16~19%)** — 컨센($188.9B 추정)을 크게 상회해, AWS 성장 가속이 가이던스 상단을 끌어올릴지가 1번 관전 포인트.</mark>
2. **AWS 성장률**: 직전 분기 AWS **+28% YoY**(15개 분기 만에 최고)·연환산 약 $150B 런레이트 — 이 가속이 이어지는지가 핵심.
3. **영업이익 vs CapEx**: Q2 영업이익 가이던스 **$20~24B**인데, 2026년 약 **$200B(추정) CapEx**(AI 데이터센터·Trainium·로보틱스) 부담이 마진을 누를지가 촉매.

---

## 1. 컨센서스 / 회사 가이던스 (발표 전 기준)
| 항목 | 회사 Q2 가이던스 | 컨센서스(추정) | 비고 |
|---|---|---|---|
| 매출 | **$194~199B** | $188.9B(추정) | YoY +16~19%, 컨센 상회 |
| 영업이익 | **$20~24B** | — | 직전 $23.9B 대비 폭넓은 레인지 |
| AWS 성장률(직전) | **+28% YoY** | — | 15개 분기 최고, 가속 지속 여부 |
| FY26 CapEx | **약 $200B(추정)** | — | AI 데이터센터·Trainium·로보틱스 |

> 직전 분기(Q1 2026, 3월 마감): 매출 **$181.5B**, 순이익 $30.3B, 희석 EPS **$2.78**, 영업이익 $23.9B, 영업마진 **13.1%**(사측 '역대 최고'). AWS 매출 $37.6B(+28% YoY). Q1 CapEx $43.2B. 출처: stockanalysis.com, Amazon IR.

## 2. 시장이 기대하는 것 (Bull 포인트)
- <mark>**AWS 재가속**: 직전 +28% YoY·약 $150B 런레이트가 이어지면 AI 클라우드 수요 초과가 재확인되는 최대 강세 시나리오.</mark>
- **컨센 상회 매출 가이던스**: $194~199B로 컨센($188.9B 추정)을 넉넉히 상회 — 리테일·광고·AWS 전반 호조.
- **AI 매출 폭증**: Bedrock·Trainium 등 AWS AI 매출이 세 자릿수 성장 코멘트 — 자체 칩(Trainium)이 마진·공급 양면 강점.
- **영업마진 레버리지**: 직전 13.1%(역대 최고) 이후 리테일 효율화·광고 고마진이 마진을 추가로 끌어올릴 여지.

## 3. 시장이 우려하는 것 (Bear 포인트)
- <mark>**약 $200B(추정) CapEx 부담**: AI 데이터센터·Trainium·로보틱스·Leo 위성 투자가 잉여현금흐름·마진을 압박할 수 있다는 점이 최대 우려.</mark>
- **AWS 공급 제약**: 전력·칩 공급 병목으로 수요가 있어도 성장률 상단이 막힐 가능성.
- **영업이익 레인지 하단**: 가이던스 하단($20B)은 직전($23.9B)보다 낮아, 투자·비용 증가가 이익을 누르면 실망 가능.
- **리테일·소비 둔화**: 거시 소비·관세 변수로 리테일 부문 성장이 흔들리면 전사 성장에 부담.

## 4. 실적발표일 체크리스트 (꼭 볼 지표)
- AWS 실제 성장률(직전 +28% YoY)·런레이트(~$150B) 가속 지속 여부
- 총매출 vs 가이던스($194~199B), 영업이익 vs 가이던스($20~24B)
- 전사 영업마진(직전 13.1%)·AWS 세그먼트 영업마진
- FY26 CapEx 실적·방향(약 $200B 추정)·전력/칩 공급 제약 코멘트
- AI(Bedrock·Trainium) 매출 성장·고객 채택 코멘트

## 5. 주가·포지셔닝 맥락
- MSFT(7/29)·META(7/29) 직후 같은 주에 발표 — 빅테크 AI CapEx 사이클이 한꺼번에 검증되는 구간이라 AWS 수치가 클라우드 3사(Azure·GCP 포함) 상대비교의 기준점이 됨.
- 시장은 매출·AWS 성장 못지않게 **CapEx 규모와 잉여현금흐름**에 민감 — 투자 가이던스 코멘트가 변동성의 관건.

- **AI의 광고 ROI 전환**: 추천·랭킹·생성형 광고 도구가 노출당 단가(가격)와 인게이지먼트를 끌어올리는 코멘트.
- **영업이익 증가 가이던스**: 막대한 AI 투자에도 'FY26 영업이익 > FY25' 제시 — 본업 레버리지가 입증되면 멀티플 방어.
- **AI 글래스·신제품**: AI 글래스 매출 성장 등 신규 동력 언급 시 장기 옵션 가치 부각.

## 3. 시장이 우려하는 것 (Bear 포인트)
- <mark>**CapEx 추가 상향 리스크**: 이미 $125~145B로 올린 투자를 또 상향하면(부품가·데이터센터) Q1처럼 호실적에도 주가가 밀릴 수 있음.</mark>
- **Reality Labs 적자**: 분기 수십억 달러대 영업적자 지속이 전사 이익을 갉아먹는 구조적 부담.
- **총비용 증가**: FY26 총비용 $162~169B 가이던스 — 인프라·인건비 상승이 마진을 압박.
- **수익화 시차**: AI 투자 대비 매출 기여가 늦으면 'CapEx 선행' 우려가 재부각, 차익실현 유발.

## 4. 실적발표일 체크리스트 (꼭 볼 지표)
- Q2 실제 매출 vs 가이던스($58~61B) 상·하단, 광고 단가·노출 성장률
- FY26 CapEx 가이던스 변화($125~145B 유지/추가 상향 여부)
- FY26 총비용 가이던스($162~169B) 조정 여부
- 전사 영업마진(직전 40.6%)·Reality Labs 영업적자 폭
- AI(광고 도구·AI 글래스) 수익화·DAP/인게이지먼트 코멘트

## 5. 주가·포지셔닝 맥락
- MSFT(7/29)·AMZN(7/31)과 동일 주간 발표 — 빅테크 AI CapEx 사이클이 한 주에 집중 검증되어 섹터 동조 변동성 큼.
- Q1 때 '호실적+CapEx 상향=주가 급락'을 이미 겪은 만큼, 시장의 반응함수는 매출보다 **투자·비용 가이던스**에 더 민감.

---

## 1. 컨센서스 / 회사 가이던스 (발표 전 기준)

- **초고마진 지속**: HBM·고용량 DRAM·eSSD 중심 믹스로 70%대 영업이익률 유지 기대.
- **연간 추정 상향 여지**: 메모리 가격 상승 지속 시 연간 영업이익 추정(270~294조원 추정) 추가 상향 가능.
- **사상 최대 경신**: 1분기 사상 최대에 이어 2분기 추가 경신 기대.

## 3. 시장이 우려하는 것 (Bear 포인트)
- **눈높이 과열**: 영업이익률 77%대 등 기대가 매우 높아, 소폭의 하회만으로도 차익실현 트리거 가능.
- **HBM 경쟁 심화**: 경쟁사 HBM4 진입·증설로 중장기 점유율·가격 협상력 변수.
- **메모리 가격 피크 우려**: 가격 급등 사이클이 정점에 가까워졌다는 우려가 재부각되면 멀티플 부담.
- **밸류에이션**: 단기 급등에 따른 고밸류 부담 — 목표가 상향(예: 360만원)에도 가격 변동성 확대 가능.

## 4. 실적발표일 체크리스트 (꼭 볼 지표)

- 영업이익률(직전 72%) 방향
- HBM 매출 비중·HBM 가격/출하 코멘트
- DRAM/NAND ASP·출하량(bit growth) 가이던스
- 2026 연간 수급·CapEx·HBM 캐파 코멘트

## 5. 주가·포지셔닝 맥락
- HBM 대표주로 메모리 슈퍼사이클 내러티브의 핵심 — 목표가 상향(예: 360만원)이 이어진 만큼, 실적이 높아진 기대에 부합하는지가 단기 방향성 결정.

# 삼성전자(005930) | 2026 2Q 실적 프리뷰 — 시장이 보는 기대 vs 우려
### 2026-07-08 잠정실적 발표 예정 · 프리뷰(발표 전)

## 세줄 요약 (관전 포인트)
1. <mark>7/8은 **잠정실적(매출·영업이익만)** 발표 — 1번 관전 포인트는 영업이익이 컨센(증권가 일부 **80조원대** 추정)에 부합하는지, 메모리 슈퍼사이클이 숫자로 확인되는지다.</mark>
2. **메모리 가격 급등 반영폭**: 2분기 DRAM·NAND 가격이 큰 폭 상승한 것으로 알려진 가운데, 이 가격 효과가 영업이익에 얼마나 실렸는지가 핵심.
3. **HBM4 램프업·비중**: 세부 IR(7월 하순)에서 HBM 매출 비중·HBM4 출하 코멘트가 추가 촉매. 잠정 단계에선 제품별 수치 미공개.

---

## 1. 컨센서스 / 회사 가이던스 (발표 전 기준)
| 항목 | 직전(1Q-26 실제) | 2Q 컨센서스(추정) | 비고 |
|---|---|---|---|
| 매출 | **133.87조원** | 약 **164.8조원**(추정) | QoQ 큰 폭 증가 기대 |
| 영업이익 | **57.23조원** | 일부 증권사 **80조원대**(예: 유안타 86.8조, 추정) | 추정치 편차 큼 |
| 영업이익률 | **42.8%** | 확인 불가 | 가격 급등 반영 여부 관건 |

> 직전 분기(1Q-26): 매출 **133.87조원**, 영업이익 **57.23조원**(YoY +756%), 영업이익률 **42.8%** — 역대 최대. HBM 매출은 전년 대비 3배 이상 증가 전망, HBM4는 2월 세계 최초 양산 출하. 출처: 삼성전자 IR, 컨퍼런스콜.
>
> ※ 회사는 잠정 단계에서 가이던스 수치를 제시하지 않음. 2Q 컨센서스는 증권가 추정이며 기관별 편차가 큼 **(추정)**.

## 2. 시장이 기대하는 것 (Bull 포인트)
- **메모리 가격 초강세**: 2분기 LPDDR5X·UFS 등 가격이 전 분기 대비 큰 폭 상승한 것으로 알려져, 가격 효과가 영업이익을 끌어올릴 것이란 기대.
- **HBM4 램프업**: HBM4 양산 출하 이후 계획대로 램프업 중 — 하반기 HBM 매출 비중 과반 전망이 2분기 실적에서 선반영되는지.
- **AI 인프라 수요 지속**: 서버용 고용량 DRAM·eSSD 등 고부가 제품 믹스 개선.
- **역대 최대 경신 기대**: 1분기 역대 최대에 이어 2분기 추가 경신 가능성.

## 3. 시장이 우려하는 것 (Bear 포인트)
- **컨센 편차·기대 과열**: 영업이익 추정치 기관별 편차가 커, 잠정치가 높은 기대(80조원대)에 못 미치면 차익실현 가능.
- **잠정 단계 정보 제한**: 7/8은 매출·영업이익만 공개 — HBM·부문별 디테일은 7월 하순 세부 실적까지 대기.
- **비메모리·파운드리**: 메모리 호조 대비 파운드리·시스템LSI 부문 수익성은 별도 변수(잠정에선 불투명).
- **환율·일회성**: 원/달러 환율과 일회성 비용이 마진을 흔들 수 있음.

## 4. 실적발표일 체크리스트 (꼭 볼 지표)
- 잠정 매출 vs 컨센(약 164.8조원 추정)
- 잠정 영업이익 vs 컨센(증권가 80조원대 추정) — 부합/상회/하회
- (세부 실적 시) HBM 매출 비중·HBM4 출하 진척
- (세부 실적 시) 메모리 ASP·출하량 코멘트, 파운드리 가동·수주
- 하반기 메모리 가격·수급 가이던스 톤

## 5. 주가·포지셔닝 맥락
- 메모리 슈퍼사이클 내러티브로 반도체 대형주 동반 강세 국면에서의 발표 — 잠정 영업이익이 이미 높아진 기대에 부합하는지가 단기 변동성의 관건.
- 7/8 잠정 → 7월 하순 세부 실적의 2단계 이벤트 구조: 잠정에서 큰 숫자, 세부에서 HBM·부문 디테일로 재평가되는 흐름에 유의.

# 엔비디아(NVDA) | 매출 $81.6B·데이터센터 $75B, 차기 가이던스 $91B로 'AI 정점론' 또 반박
### FQ1-27 실적 (분기말 2026-04-26 / 2026-05-20 발표)

## 세줄 요약
1. <mark>매출 **$81.6B**(YoY +85%, QoQ +20%)로 컨센서스를 약 **$2.8B 상회**, 데이터센터 단독 **$75B**.</mark>
2. 차기(FQ2-27) 가이던스 **$91B**로 컨센 대비 +$4B, 총마진 ~75% 유지 → Blackwell 가격결정력 건재.
3. 배당 25배 인상($0.01→$0.25) + **$80B 자사주** 승인으로 주주환원도 대폭 확대.

---

- **컨센 상회.** 매출 **$81.6B**(컨센 대비 +$2.8B), 총마진 **74.9%**, 영업이익률 65.6%, 순이익 **$58.3B**, EPS **$2.39**.
- **데이터센터가 전부.** DC 매출 **$75B**(YoY +92%, QoQ +21%) — 컴퓨팅 $60B(+77% YoY) + 네트워킹 $15B(YoY 약 3배).
- **차기 가이던스 서프라이즈.** FQ2-27 매출 **$91B±**, 총마진 ~75%. '이번이 정점' 우려를 또 반박.
- **소버린 AI·Vera CPU.** 국가단위 AI 매출 YoY +80%, 에이전틱 AI용 Vera CPU 기회 부각.

## 3. 가이던스 (FQ2-27)
| 항목 | 가이던스 | 비고 |
|---|---|---|
| 매출 | **$91B ± 2%** | 컨센 대비 +$4B |
| 총마진 | ~75% | 가격결정력 유지 |
| 성장축 | Blackwell 풀생산 + 소버린 AI | — |

→ 투자자 입장에서 의미: <mark>QoQ +20% 다음 분기에 또 $91B(+11% QoQ)를 제시하며 총마진 75%를 지킨 게 핵심 — "물량이 늘어도 가격이 안 깎인다"는 증거다.</mark> 단, 중국 수출규제 변수는 여전히 잠재 리스크.

## 4. 부문별 실적 (Segment)

| 게이밍·기타 | ~$6.6B(도출) | ~8% | 게이밍·프로비주얼·오토 합산 |

→ 투자자 입장에서 의미: <mark>매출의 90% 이상이 데이터센터 — 엔비디아는 사실상 'AI 인프라 회사'다.</mark> 네트워킹(스파인·NVLink)이 YoY 3배로 뛴 점은, GPU뿐 아니라 '랙 전체'를 파는 구조로 확장됐음을 보여준다.

## 5. 기타 주요 지표 (수익성)
| 항목 | 수치 | 비고 |
|---|---|---|
| 총마진 | 74.9% | 반도체 업계 최상위 |

## 7. 경영진이 자신있어하는 부문
- **① Blackwell 램프**: 풀생산 진입에도 총마진 75% 유지.
- **② 네트워킹**: DC 네트워킹 $15B로 YoY 약 3배 — 랙스케일 지배력.
- **③ 소버린 AI**: 국가단위 AI 매출 YoY +80%, 신규 수요축.
- **④ Vera CPU·에이전틱 AI**: 차세대 CPU 기회.

## 8. 리스크로 고려해야 할 부문
- **중국 수출규제**: 정책 변화에 따른 매출 변동성.
- **고객 집중·하이퍼스케일러 CapEx 의존**: 소수 대형 고객의 투자 사이클에 민감.
- **경쟁 심화**: AMD(MI400)·커스텀 ASIC(브로드컴 XPU)의 추격.
- **밸류에이션·기대치**: 시총이 거대해 '서프라이즈 허들'이 매분기 높아짐.

> 출처: 어닝콜 / stockeasy. 일부 컨센서스는 (추정).

## 3. 가이던스 (FQ4-26 / FY2026~2027)

|---|---|---|---|

→ 투자자 입장에서 의미: 핵심은 FQ4 매출 **$50B**. QoQ로 또 +20%라 '이번이 정점 아니냐'는 시장 우려를 정면으로 깬다. <mark>다만 총마진을 86%로만 잡으며 "가격 상승률 둔화"를 명시한 건 **마진 모멘텀 1차 고점 신호**일 수 있다</mark>(가격이 떨어지는 게 아니라 오르는 속도가 느려진다는 의미).

## 4. 부문별 실적 (Segment)

→ 투자자 입장에서 의미: 데이터센터(CMBU+CDBU)가 매출의 **61%**로 무게중심이 완전히 AI로 이동. 모바일·PC조차 마진 87%인 건, 데이터센터로 물량을 몰아주면서 일반 메모리도 품귀 → 가격이 동반 상승했기 때문. <mark>**HBM뿐 아니라 일반 DRAM까지 마진이 좋아진 게 이번 분기 숨은 포인트.**</mark>

## 5. 기타 주요 지표 (현금흐름·재무구조)

| 현금·투자 잔액 | $30.2B | 역대 최고 |

## 6. 주주환원
- 분기 배당 **$0.15/주**(7/21 지급) → 연환산 $0.60, 시총 ~$1.2조 대비 배당수익률 ~0.05%로 미미.

→ 투자자 입장에서 의미: 지금 배당은 사실상 상징적 수준. 진짜 메시지는 "**12/9 이후 자사주 매입 본격화**". <mark>단기 배당주가 아니라 **2027년 자본 반환 스토리**로 봐야 한다.</mark>

## 7. 경영진이 자신있어하는 부문
- **① SCA — 비즈니스 모델의 구조적 전환** (Sanjay Mehrotra, CEO): 16건 체결, 완료 시 매출 절반 이상이 SCA 하. "바닥 가격에서도 총마진이 과거 어떤 사이클 최고점보다 훨씬 높다."

- **③ 공급 부족의 구조적 장기화**: 신규 팹 리드타임·인력·규제·전력 제약으로 2027년 이후에도 타이트 → 가격 결정력 장기 유지.
- **④ 재무 체력** (Mark Murphy, CFO): FCF·순현금·신용등급 모두 역대급. "대차대조표가 그 어느 때보다 강력하다."

## 8. 리스크로 고려해야 할 부문
- **가격 상승률 둔화(마진 1차 고점 신호)**: CFO가 FQ4 마진 86% 가이던스에서 "가격 상승률의 의미 있는 둔화" 명시.

- **사이클 산업 특성**: 2028년 점진 개선 전망은 곧 공급 증가 가능성 → 장기 가격 하락 리스크 상존.
- **고객 집중·SCA 가정**: 누적 $1,000억은 '최소가격' 기준 회사 주장치로, 실제는 상·하방 모두 열려 있음.

---

## 1. Key Takeaways (핵심 요약)

- **데이터센터가 성장축.** DC 매출 **$1.83B**(YoY +27%), 커뮤니케이션·기타 $585M(YoY +29%).
- **커스텀 실리콘 '두 배론'.** FY28 커스텀 실리콘 매출이 두 배 이상 성장 전망 — 신규 tier-1 XPU 프로그램 램프 + 10개 이상 'XPU-attached' 프로그램 양산 진입(회사 주장).
- **스케일아웃 스위치.** FY27 매출 $600M 초과(FY26 대비 2배), FY28 연환산 $1B 경로(회사 주장).
- **주가 촉매**: AI 데이터센터용 커스텀 ASIC + 고속 광 인터커넥트 — 하이퍼스케일러 자체 칩 수주가 핵심.

|---|---|---|

| 총마진(GAAP) | **52.2%** | Non-GAAP은 더 높음 (추정) |

| 데이터센터 | **$1.83B** | YoY +27% |

## 3. 가이던스 (FQ2-27 및 연간)
| 항목 | 가이던스 | 비고 |
|---|---|---|
| FQ2-27 매출 | **$2.7B±** | QoQ 추가 성장 |
| FY27 매출 | **약 $11.5B** | YoY 약 +40% |
| FY28 매출 | **약 $16.5B** | 한 분기 만에 +$1.5B 상향 |

→ 투자자 입장에서 의미: <mark>FY28 목표를 한 분기 만에 $1.5B 올린 게 핵심 — 커스텀 실리콘 수주가 '계획'이 아니라 '확정 파이프라인'으로 굳어지고 있다는 신호다.</mark> 단, 단일 tier-1 고객 의존도는 양날의 검.

## 4. 부문별 실적 (Segment)

|---|---|---|---|

→ 투자자 입장에서 의미: <mark>매출의 4분의 3이 데이터센터로, 마벨은 사실상 'AI 인프라 ASIC 회사'로 변모했다.</mark> 비(非)DC 부문도 회복세라 사이클 저점 통과 신호로 읽힌다.

## 6. 주주환원
- 분기 배당 **$0.06**(연 $0.24, 차기 ex-date 2026-07-10).

- **② 스케일아웃 스위치**: FY27 $600M 초과, FY28 연환산 $1B 경로.
- **③ 광 인터커넥트**: 고속 옵틱스로 랙 간 연결 지배력.

### FQ1-26 실적 (분기말 2026-03-31 / 2026-05-05 발표)

## 세줄 요약
1. <mark>매출 **$308.4M**(YoY +93%, QoQ +14%)로 가이던스 상단($297M)을 상회, PCIe 6 포트폴리오가 견인.</mark>

---

## 1. Key Takeaways (핵심 요약)
- **가이던스 상회.** 매출 **$308.4M**(가이던스 상단 $297M 초과), GAAP 총마진 **76.3%**, 영업이익률(GAAP) 20.1%, 순이익(GAAP) **$80.3M**, GAAP EPS **$0.44**, Non-GAAP EPS **$0.61**(회사 주장).
- **PCIe 6가 핵심.** PCIe Gen 6 솔루션이 전체 매출의 1/3 이상 — 시그널 컨디셔닝 + 패브릭 동시.
- **Scorpio 램프.** Scorpio X-Series 320레인 AI 패브릭 스위치 초기 양산 출하, 320레인 버전은 2026 하반기 본격 램프.
- **주가 촉매**: AI 커넥티비티 순수 플레이 — PCIe 6 / Scorpio 패브릭이 AI 서버 스케일업 인터커넥트의 핵심 부품.

## 2. 주요 실적 지표 (FQ1-26)

| 총마진(GAAP) | **76.3%** | 업계 최상위급 |
| 영업이익률(GAAP) | **20.1%** | Non-GAAP 36.2%(회사 주장) |
| 순이익(GAAP) | **$80.3M** | — |
| EPS(희석) | **$0.44** GAAP | Non-GAAP **$0.61**(회사 주장) |

## 3. 가이던스 (FQ2-26)
| 항목 | 가이던스 | 비고 |
|---|---|---|
| 매출 | **$355~365M** | 컨센 상회 |
| Non-GAAP EPS | **$0.68~0.70** | — |
| 총마진 | **~73%** | 하드웨어 믹스↑·아마존 워런트 contra-revenue로 하락 |

→ 투자자 입장에서 의미: <mark>매출은 더 크게 가이드했지만 총마진을 76%→73%로 낮춘 게 핵심 — Scorpio 같은 하드웨어 믹스 확대와 $6.5B 아마존 워런트 비용이 마진을 누른다.</mark> 성장 대가로 마진 일부를 내주는 전환 구간이다.

## 4. 부문별 실적 (제품군)
| 제품군 | 비중 | 비고 |
|---|---|---|
| PCIe 6(시그널+패브릭) | 매출의 1/3 이상 | 핵심 성장축 |
| Aries(리타이머)·기타 | 잔여 | 기존 주력 |
| Scorpio X/P-Series | 램프 초기 | 320레인 AI 패브릭, 하반기 본격화 |

> 부문별 정확한 금액 분해는 (확인 불가) — 회사가 제품군 비중 위주로 공개.

→ 투자자 입장에서 의미: <mark>PCIe 6 한 세대에서 매출 1/3을 만든다는 건 제품 세대교체가 곧 매출 점프로 직결되는 구조라는 뜻.</mark> Scorpio 스위치가 다음 성장 레버다.

## 5. 기타 주요 지표 (현금흐름·재무구조)
| 항목 | 수치 | 비고 |
|---|---|---|
| 총마진 | 76.3% | 팹리스 IP형 고마진 |
| 현금·부채 상세 | 확인 불가 | 본 요약 미포함 |
| 아마존 워런트 | $6.5B 규모 | contra-revenue 차감 예정 |

→ 투자자 입장에서 의미: <mark>76% 총마진은 순수 IP·실리콘 기업의 전형이지만, 아마존 워런트가 향후 매출에서 차감되며 표면 마진을 깎는 점은 주의해야 한다.</mark>

## 6. 주주환원
- 배당·자사주 프로그램 없음 — 전형적 고성장 단계 기업.
- 현금은 R&D·제품 확장에 재투자.

→ 투자자 입장에서 의미: <mark>환원이 없다는 건 성장 재투자 우선 단계라는 뜻 — 주주 보상은 주가 성장으로만 받는 구조다.</mark>

## 7. 경영진이 자신있어하는 부문
- **① PCIe 6 포트폴리오**: 매출 1/3 이상, 세대교체 수혜.
- **② Scorpio AI 패브릭**: 320레인 X-Series 양산 진입.
- **③ 하이퍼스케일러 채택**: 아마존 등 대형 고객 파트너십.
- **④ 스케일업 스위칭**: AI 서버 내부 인터커넥트 확장.

## 8. 리스크로 고려해야 할 부문
- **마진 압박**: 하드웨어 믹스·아마존 워런트로 총마진 하락(76%→73%).
- **밸류에이션**: YoY +93% 고성장 선반영, 기대치 허들 높음.
- **고객 집중**: 소수 하이퍼스케일러 의존.
- **경쟁**: 마벨·브로드컴 등 대형사의 인터커넥트 진입.

→ 투자자 입장에서 의미: 분기별 구체 환원 규모는 확인 불가하나, <mark>높은 순이익률 기반의 꾸준한 배당·자사주 환원이 KLA 투자매력의 한 축이다(추정).</mark>

- **③ WFE 사이클**: 2026 WFE $140B+ 전망, 2027 성장률은 2026보다 높을 것으로 전망.
- **④ AI·HBM·선단 로직**: 리딩엣지 파운드리·메모리 투자 수혜.

## 8. 리스크로 고려해야 할 부문
- **DRAM 원가 헤드윈드**: 메모리 믹스에 따른 마진 압박 가능성(회사 언급).

# 크라우드스트라이크(CRWD) | ARR $5.51B·순신규 ARR $256M(분기 최대), Charlotte AI·Falcon Flex로 재가속

### Q1 FY27 실적 (분기말 2026-04-30 / 2026-06-03 발표)

## 세줄 요약
1. <mark>매출 **$1.39B**(YoY +26%)로 컨센 ~$1.36B 상회, non-GAAP EPS **$1.10**(컨센 ~$1.07)도 Beat.</mark>
2. ARR **$5.51B(+24%)**, 순신규 ARR **$256M**(분기 사상 최대, +32% YoY)로 2024년 7월 장애 이후 정상화 확인.
3. Charlotte AI(에이전틱 보안)·Falcon Flex(ARR $1.9B·+99%)가 촉매 — 단, ~67% 급등 후라 발표 뒤 주가 약 -11%. (※ 7월 초 4:1 액면분할 예정, 아래 EPS는 분할 전 기준)

---

## 1. Key Takeaways (핵심 요약)
- **컨센 상회.** 매출 **$1.39B**(컨센 ~$1.36B, +26% YoY), non-GAAP EPS **$1.10**(컨센 ~$1.07). "가이드한 모든 지표 상회".
- **ARR 재가속.** ARR **$5.51B(+24%)**, 순신규 ARR **$256M**(분기 최대, +32% YoY). 구독매출 $1.32B(+26%).
- **수익성·현금.** non-GAAP 구독 총마진 **81%**, FCF **$468M**(마진 ~34%, 분기 최대), GAAP 순이익 $27.8M 흑자전환(전년 -$104.3M).
- **AI·Flex 촉매.** Charlotte AI + AI 에이전트 10종, Falcon Flex ARR $1.9B(+99%), Next-Gen SIEM ARR $600M+.

## 2. 주요 실적 지표 (Q1 FY27)
| 지표 | 실제 | 비고 |
|---|---|---|
| 매출 | **$1.39B** | 컨센 ~$1.36B 상회, YoY +26% / QoQ +6.2% |
| 총마진(GAAP) | **75.3%** | non-GAAP 구독 총마진 81% |
| 순이익(GAAP) | **$27.8M** | 흑자전환(전년 -$104.3M) |
| EPS(non-GAAP) | **$1.10** | 컨센 ~$1.07, GAAP EPS $0.11 |
| ARR | **$5.51B** | YoY +24%, 순신규 ARR $256M |

> 출처: CrowdStrike IR(Q1 FY27 8-K/Business Wire), stockanalysis.com. 컨센서스 일부 (추정). EPS는 4:1 액면분할 전 기준.

## 3. 가이던스
| 항목 | 가이던스 | 비고 |
|---|---|---|
| Q2 FY27 매출 | **$1.436B~$1.442B** | YoY ~+23% |
| Q2 FY27 non-GAAP EPS | **$1.16~$1.17** | — |
| FY27 매출 | **$5.915B~$5.959B** | — |
| FY27 non-GAAP EPS | **$4.88~$4.96** | — |
| FY27 순신규 ARR 성장 | **중간값 ~27.7%** | +520bp 상향(재가속) |

→ 투자자 입장에서 의미: <mark>FY27 순신규 ARR 성장을 +520bp나 올린 게 핵심 — 2024년 7월 대형 장애의 후유증을 완전히 떨치고 '재가속' 국면에 진입했다는 회사의 자신감이다.</mark> FCF 마진도 FY27 최소 30%로 견고.

## 4. 부문별/매출 구성 실적
| 구분 | 매출/ARR | 성장 | 비고 |
|---|---|---|---|
| 구독매출 | $1.32B | YoY +26% | 매출의 ~95% |
| Falcon Flex(소비형) | ARR $1.9B+ | +99% YoY | 300+ 신규 계정, 플랫폼 통합 견인 |
| Next-Gen SIEM | ARR $600M+ | — | 클라우드+SIEM+ID 합산 ARR $2B+ |
| Charlotte AI 등 AI | 별도 미공개 | 사용 6x+ YoY | 에이전틱 보안 촉매 |

→ 투자자 입장에서 의미: <mark>Falcon Flex(소비형 라이선스)가 ARR $1.9B·+99%로 폭발하며 '단일 제품 → 플랫폼 통합' 전환을 입증했다.</mark> 재계약(ReFlex) 고객이 평균 26%, 멀티-리플렉스는 51% ARR 상향 — 락인과 상향판매가 동시 작동.

## 5. 기타 주요 지표 (현금흐름·SaaS 지표)
| 항목 | 수치 | 비고 |
|---|---|---|
| ARR / 순신규 ARR | **$5.51B / $256M** | +24% / 분기 최대(+32%) |
| 달러기반 순유지율 | **~119%** | 2차/애널리스트 추정, 회사 미공개 |
| 총유지율 | **~97%** | 코멘터리 기반, 장애기간 내내 유지 |
| non-GAAP 구독 총마진 | **81%** | 전년 80% |
| Free Cash Flow | **$468M** | FCF 마진 ~34%, 분기 최대 |
| 모듈 채택 | **6개+ 모듈 51%** | 5+/7+/8+ 세부 확인 불가 |

→ 투자자 입장에서 의미: <mark>FCF $468M(마진 34%)와 81% 구독 총마진은 보안 SaaS 최상위 수익성으로, 장애 이후에도 비즈니스 모델이 멀쩡하다는 가장 객관적인 증거다.</mark> 순유지율 ~119%는 회사가 정확한 수치를 공개하지 않아 추정치임에 유의.

## 6. 주주환원
- 배당 없음(성장주). 자사주 프로그램 규모 본 요약 미포함.
- **7월 초 4:1 액면분할 예정** — 주당 가격 접근성 개선 목적.

→ 투자자 입장에서 의미: <mark>FCF 마진 30%+를 안정적으로 내는 단계에 들어, 향후 환원 여력이 커지는 한편 액면분할로 개인투자자 접근성을 높이려는 행보다.</mark>

## 7. 경영진이 자신있어하는 부문
- **① Charlotte AI/에이전틱 보안**: AI 에이전트 10종, 사용 6x+ YoY.
- **② Falcon Flex**: ARR $1.9B(+99%), 플랫폼 통합 가속.
- **③ Next-Gen SIEM/클라우드/ID**: 합산 ARR $2B+.
- **④ 장애 정상화**: 순신규 ARR 분기 최대, 총유지율 ~97% 유지.

## 8. 리스크로 고려해야 할 부문
- **밸류에이션·기대치**: ~67% 급등 후 발표 뒤 -11% — 허들 높음.
- **유지율 불투명성**: 회사가 정확한 순유지율을 공개 안 함(~119%는 추정).
- **장애 잔여 영향**: CCP(고객 보상) 잔여분 소멸했으나 신뢰 회복 진행형.
- **경쟁 심화**: 마이크로소프트·SentinelOne·팔로알토와 보안 플랫폼 경쟁.

# 데이터독(DDOG) | 매출 첫 $1B 돌파(+32%)·총ARR $4B+, AI-네이티브·LLM 관측이 재가속 견인

### Q1 FY26 실적 (분기말 2026-03-31 / 2026-05-07 발표)

---

- **수익성 견고.** 총마진(GAAP) **79.2%**, non-GAAP 영업마진 **22%**, FCF **$289M(마진 29%)**. GAAP 순이익 $52.6M.

## 2. 주요 실적 지표 (Q1 FY26)
| 지표 | 실제 | 비고 |
|---|---|---|

| 총마진(GAAP) | **79.2%** | non-GAAP 영업마진 22% |

## 3. 가이던스 (상향)
| 항목 | 가이던스 | 비고 |
|---|---|---|

## 5. 기타 주요 지표 (현금흐름·SaaS 지표)

→ 투자자 입장에서 의미: <mark>RPO +51%는 매출 성장(+32%)을 크게 앞질러, 미래 매출의 가시성이 빠르게 두꺼워지고 있다는 강력한 선행신호다.</mark> DBNRR이 다시 120%대로 올라선 점은 기존 고객의 소비 확대가 재가속됐음을 의미.

## 6. 주주환원
- 배당 없음(성장주). 자사주 프로그램 본 요약 미포함.
- FCF $289M(마진 29%)·총 ARR $4B+로 자가 성장 동력 확보.

## 7. 경영진이 자신있어하는 부문

- **② LLM Observability**: span ~3배, MCP 호출 4배 — AI 관측 신시장 선점.
- **③ Bits AI 에이전트**: Bits AI SRE/Security Analyst GA, 조사 건수 2배+.
- **④ 플랫폼 통합**: 4개+ 제품 고객 56%, RPO +51%.

## 8. 리스크로 고려해야 할 부문

- **경쟁 심화**: 신생 관측·AI 모니터링 업체 및 클라우드 자체 도구와의 경쟁.

### FQ3-26 실적 (분기말 2026-03-31 / 2026-05 발표)

1. <mark>분기 매출 **$144.8M**로 QoQ −21.6%, 영업손실 **−$233.5M**으로 적자 확대 — 현재 손익은 약하다.</mark>
2. 대신 **계약 ARR $3.1B** 확보(연말 CY26 $3.7B 목표), **MS $9.7B**·**NVIDIA $3.4B** 다년 AI 클라우드 계약이 핵심.
3. NVIDIA B300 5만 장+ 추가 발주로 **GPU 15만 장** 규모 확보 → 매출은 2027년부터 본격 램프업 예정.

---

## 1. Key Takeaways (핵심 요약)
- **현재 실적은 부진.** 매출 **$144.8M**(QoQ −21.6%, YoY 보합), 총마진 72.4%는 높지만 영업손실 **−$233.5M**·순손실 **−$247.8M**(EPS −$0.74). 데이터센터·GPU 증설 비용이 손익을 압박.
- **진짜 스토리는 백로그.** 분기말 기준 **계약 ARR $3.1B**. AI 클라우드 신규 계약 반영 시 ARR 목표가 $3.7B → **$4.4B**로 상향.
- **앵커 고객 확보.** **마이크로소프트와 $9.7B 다년 AI 클라우드 계약**, **NVIDIA와 $3.4B 5년 계약**(Childress, Blackwell GPU, 2027 초 램프).
- **물량 선확보.** NVIDIA B300 GPU **5만 장+ 추가 발주** → 총 **15만 장** 규모 플릿 확보.

## 2. 주요 실적 지표 (FQ3-26)
| 지표 | 실제 | QoQ | YoY | 비고 |
|---|---|---|---|---|
| 매출 | **$144.8M** | −21.6% | 보합 | BTC 채굴 비중 축소 영향 |
| 총마진 | 72.4% | +8%p | — | 마진 자체는 높음 |
| 영업이익 | **−$233.5M** | 적자확대 | — | 증설·SBC 비용 |
| 순이익 | **−$247.8M** | 적자확대 | — | EPS −$0.74 |

> 참고: 직전 FQ1-26(2025-09)엔 순이익 +$384.6M(EPS $1.08) 기록 → 영업이 아닌 평가성 손익 영향이 큼(이익의 변동성 주의). 출처: stockanalysis.com, IREN IR.

## 3. 가이던스 (ARR / 캐파)
| 항목 | 내용 | 구분 |
|---|---|---|
| 계약 ARR(현재) | **$3.1B** (분기말 기준) | 수치 |
| ARR 목표(CY26말) | **$3.7B** → 신규계약 반영 시 **$4.4B** | 수치 |
| MS 계약 | **$9.7B** 다년 AI 클라우드 | 수치 |
| NVIDIA 계약 | **$3.4B** 5년, Childress 60MW, **2027 초 램프** | 수치 |
| GPU 플릿 | B300 5만+ 추가 → 총 **15만 장** | 수치 |

→ 투자자 입장에서 의미: <mark>지금 매출($145M)과 계약 ARR($3.1B+)의 격차가 이 종목의 전부 — 현재가 아니라 2027년 이후 램프업에 베팅하는 구조다.</mark> 계약은 화려하지만 "계약 → 실제 매출" 전환은 데이터센터 건설·GPU 인도·전력 확보가 일정대로 돼야 가능하다.

## 4. 부문별 동향 (Bitcoin 채굴 / AI 클라우드 / 데이터센터)
| 부문 | 동향 | 비고 |
|---|---|---|
| AI 클라우드 | MS·NVIDIA 계약 기반 본격 확장, 2027 램프 | 성장 엔진 |
| 비트코인 채굴 | 비중 축소(전환 중) | 현 매출의 상당분, 변동성 큼 |
| 데이터센터·전력 | Childress 등 캐파 확보가 핵심 자산 | 전력·부지가 진입장벽 |

> 부문별 매출 분리 수치는 본 요약 기준 미확보(확인 불가).

→ 투자자 입장에서 의미: <mark>강점은 '전력 확보된 데이터센터 부지' — AI 시대에 가장 희소한 자원을 이미 쥐고 있다는 점이 MS·NVIDIA가 IREN을 택한 이유.</mark> 반대로 비트코인 채굴 매출은 코인 가격·난이도에 출렁여 단기 실적의 변수다.

## 5. 기타 주요 지표 (현금흐름·재무구조)
| 항목 | 수치 | 비고 |
|---|---|---|
| 조정 EBITDA | 약 $93.9M (직전 분기 기준) | EBITDA 마진 ~41% |
| 시가총액 | 약 $20B (2026-05 기준) | 주가 ~$61 |
| CapEx / 현금 / 차입 | 확인 불가 | 대규모 GPU·데이터센터 투자 필요 |

→ 투자자 입장에서 의미: <mark>15만 장 GPU + 데이터센터 건설에는 수십억 달러 자금이 필요 — 증자·차입에 따른 희석/이자 부담이 최대 변수다.</mark> EBITDA는 플러스지만 영업·순손익은 적자라, '돈을 태워 캐파를 짓는' 단계임을 분명히 인식해야 한다.

## 6. 주주환원
- 배당·자사주 **없음**(성장 투자 단계). 오히려 캐파 자금 조달 과정의 **주식 희석 가능성**에 유의.

→ 투자자 입장에서 의미: 환원을 기대할 종목이 아니다. <mark>현금은 전부 데이터센터·GPU에 재투자 — 주주가치는 '계약을 매출로 전환하는 실행력'에서 나온다.</mark>

## 7. 경영진이 자신있어하는 부문
- **① 계약 백로그**: 계약 ARR $3.1B, MS $9.7B·NVIDIA $3.4B 앵커 고객.
- **② 전력·부지 캐파**: Childress 등 전력 확보된 데이터센터 — AI 인프라의 핵심 병목 자산.
- **③ GPU 스케일**: B300 포함 총 15만 장 플릿 확보로 대형 AI 클라우드 공급 능력.
- **④ 전환 스토리**: 비트코인 채굴 → 고마진 AI 클라우드로 사업 재편.

## 8. 리스크로 고려해야 할 부문
- **현재 적자**: 영업손실 −$233.5M, 매출은 오히려 QoQ 감소 — 실적과 기대의 괴리가 크다.
- **램프업 실행 리스크**: 핵심 매출이 2027년 이후 → 건설 지연·GPU 인도 지연·전력 차질 시 시나리오 훼손.
- **자금조달·희석**: 대규모 CapEx → 증자/차입 의존, 주식 희석·금리 부담.
- **고객 집중**: MS 등 소수 대형 계약 의존 → 계약 변경/축소 시 충격.
- **비트코인 노출 & 밸류에이션**: 채굴 매출의 코인가격 변동성 + 적자 상태에서 시총 $20B의 '스토리 프리미엄' → 변동성 매우 큼.

# 삼성전자(005930) | 영업이익 57.2조 '8배 폭증', 반도체가 전사 이익의 93%
### 2026년 1분기 실적 (2026-04-30 발표)

## 세줄 요약
1. <mark>매출 **133.9조원**·영업이익 **57.2조원**으로 컨센(매출 117조·영업익 38조)을 크게 상회, 영업익 QoQ +185%·YoY 8배+.</mark>
2. DS(반도체) 영업이익 **53.7조원**(영업이익률 66%)으로 전사 이익의 **93% 이상**, 메모리 매출 74.8조(YoY +292%).
3. HBM4·SOCAMM2 업계 최초 동시 양산, 1Q 배당 372원 + **자사주 7.6조 취득**으로 주주환원도 역대급.

---

## 1. Key Takeaways (핵심 요약)
- **컨센 대폭 상회.** 매출 **133.9조원** vs 컨센 ~117.1조(**+14%**), 영업이익 **57.2조원** vs 컨센 ~38.1조(**+50%**). QoQ 매출 +43%(+40조)·영업익 +185%(+37.2조).
- **반도체 독주.** DS부문 매출 **81.7조원**·영업이익 **53.7조원**(OPM 66%)으로 역대 최대. 반도체가 전사 영업이익의 **93%+** 차지. 메모리 매출 **74.8조원**(QoQ +101%, YoY +292%).
- **AI 수요가 견인.** AWS·구글·메타·MS·OpenAI 등 AI/클라우드 서버 메모리 수요 폭발. 경영진 "내년까지 수요가 밀려든다".
- **기술 리더십.** HBM4 + 저전력 SOCAMM2 업계 최초 동시 양산, PCIe Gen6 SSD 적기 개발. 올해 HBM 매출 전년 대비 3배+ 전망.

## 2. 주요 실적 지표 (2026 1Q)
| 지표 | 실제 | 컨센서스 | 서프라이즈 | 증감 |
|---|---|---|---|---|
| 매출 | **133조 9,000억** | ~117.1조 | +14% | QoQ +43% |
| 영업이익 | **57조 2,000억** | ~38.1조 | **+50%** | QoQ +185% / YoY 8배+ |
| DS 영업이익 | **53조 7,000억** | — | — | 전사 이익의 93%+ |
| 메모리 매출 | **74조 8,000억** | — | — | QoQ +101% / YoY +292% |

> 출처: 삼성전자 IR/뉴스룸, 컨퍼런스콜. 컨센서스는 에프엔가이드 집계.

## 3. 가이던스 / 시황 전망
| 항목 | 내용 | 구분 |
|---|---|---|
| 수요 전망 | AI/클라우드 메모리 수요 "내년까지 견조" | 정성 |
| HBM | 올해 HBM 매출 전년 대비 **3배+** 전망, HBM4 양산 | 수치/정성 |
| 파운드리 | 2나노 공정 정조준, 수주 확대 추진 | 정성 |
| CapEx·현금 | 본 자료 기준 구체 수치 미확보 | 확인 불가 |

→ 투자자 입장에서 의미: <mark>구체 매출 가이던스보다 "수요가 내년까지 밀려든다"는 자신감이 핵심 — 메모리 슈퍼사이클이 단기 이벤트가 아니라는 메시지.</mark> 다만 삼성은 HBM에서 SK하이닉스에 후발이라, 'HBM 점유율을 얼마나 빠르게 따라잡느냐'가 다음 분기들의 관전 포인트.

## 4. 부문별 실적 (Segment)
| 부문 | 매출 | 영업이익 | 비고 |
|---|---|---|---|
| DS (반도체) | 81.7조 | **53.7조** | 메모리 74.8조 + 시스템LSI·파운드리 ~6.9조(도출) |
| DX+SDC+Harman (비반도체) | — | **~3.5조**(도출) | 전사 57.2조 − DS 53.7조 |

> DX(모바일·가전)·SDC(디스플레이)·Harman 부문별 세부 수치는 본 자료엔 미분리(확인 불가). 합산 영업익은 전사−DS로 약 3.5조 추정.

→ 투자자 입장에서 의미: <mark>전사 이익의 93%가 반도체에서 나왔다 = 삼성전자가 사실상 '메모리 회사'로 다시 쏠린 분기.</mark> 모바일·가전·디스플레이는 견조하지만 이익 기여도는 상대적으로 미미해졌다. 반도체 사이클이 곧 삼성 주가의 핵심 변수.

## 5. 기타 주요 지표 (현금흐름·재무구조)
| 항목 | 수치 | 비고 |
|---|---|---|
| 영업이익률(전사) | 43% | 영업익 57.2조 / 매출 133.9조 |
| DS 영업이익률 | 66% | 메모리 호황 직접 반영 |
| CapEx / 현금성자산 | 확인 불가 | 본 자료 미확보 |
| 재고 | 확인 불가 | 본 자료 미확보 |

→ 투자자 입장에서 의미: 전사 영업이익률 43%, 반도체 단독 66%는 삼성 역사에서도 드문 레벨. <mark>이익의 질(메모리 가격에 연동)이 좋아진 만큼, 가격이 꺾이면 같은 속도로 빠질 수 있는 사이클 민감도도 함께 커졌다.</mark>

## 6. 주주환원
- 1분기 배당 **주당 372원**(보통주·우선주, 총 **2조 4,533억원**).
- 1분기 **자사주 7.6조원 취득**.
- 3개년 주주환원 정책 **마지막 해** — 3년간 FCF의 **50% 환원**, 연 **9.8조원** 정규배당 이행. 차기 정책은 논의 중.

→ 투자자 입장에서 의미: <mark>역대급 이익에 더해 자사주 7.6조까지 더한 강력한 환원.</mark> 단, 현 3개년 정책이 올해로 끝나 **차기 환원정책의 규모·방식**이 향후 주가의 핵심 모멘텀이 될 수 있다.

## 7. 경영진이 자신있어하는 부문
- **① 메모리 슈퍼사이클**: AI/클라우드 수요가 "내년까지 견조", 메모리 매출 YoY +292%.
- **② 기술 동시 리더십**: HBM4 + SOCAMM2 업계 최초 동시 양산, PCIe Gen6 SSD 선행.
- **③ HBM 성장**: 올해 HBM 매출 전년 대비 3배+ 전망 → 후발 격차 축소 의지.
- **④ 주주환원 의지**: 자사주 7.6조 + 정규배당 9.8조 이행.

## 8. 리스크로 고려해야 할 부문
- **HBM 후발 포지션**: HBM 고객(특히 엔비디아) 검증·점유율에서 SK하이닉스 대비 후발 → 경쟁 심화 시 마진·점유율 변동.
- **일반 DRAM 의존**: 현 시점 일반 DRAM이 HBM보다 수익성이 높은 구조 → HBM 전환 속도에 따라 믹스 리스크.
- **비메모리 수익성**: 시스템LSI·파운드리는 가동률·수율에 따라 적자 가능성(부문 미분리로 불투명).
- **사이클·가격**: 메모리 가격 정점 통과 시 이익 급감 가능성. 전사 이익의 93% 반도체 집중은 양날의 검.
- **차기 환원정책 불확실**: 3개년 정책 종료 → 다음 정책 미확정.

# 샌디스크(SNDK) | 매출 $5.95B '가이던스 박살', 데이터센터 SSD +233%·$42B 수주잔고
### FQ3-26 실적 (분기말 2026-04-03 / 2026-04-30 발표)

## 세줄 요약
1. <mark>매출 **$5.95B**로 가이던스 $4.4~4.8B를 압도, QoQ **+97%**·YoY **+251%** 폭증.</mark>
2. 비GAAP 총마진 **78.4%**(가이 65~67%)·비GAAP EPS **$23.41**(가이 $12~14)로 전 항목 가이던스 대폭 상회.
3. 다년계약 5건·금융보증 $11B·신규 3건으로 **최소 $42B 수주잔고** 확보 + **$6B 자사주** 승인.

---

## 1. Key Takeaways (핵심 요약)
- **전 항목 가이던스 박살.** 매출 **$5.95B** vs 가이 $4.4~4.8B, 비GAAP 총마진 **78.4%** vs 가이 65~67%, 비GAAP EPS **$23.41** vs 가이 $12~14. GAAP 순이익 $3.62B(EPS $23.03).
- **데이터센터가 폭발.** 엔터프라이즈 SSD(데이터센터) 매출 **$1,467M**으로 QoQ **+233%**, TLC 기반 AI 워크로드 수요가 견인.
- **장기계약 구조화.** 5건의 다년 공급계약 + 금융보증 **$11B 초과**, 이번 분기 3건 신규 체결로 **최소 $42B 수주잔고**. FY2027 비트 공급의 1/3 이상이 계약으로 고정. 선결제금 $400M 수령.
- **차기 가이던스도 우상향.** FQ4-26 매출 **$7.75~8.25B**, 총마진 **79~81%**.

## 2. 주요 실적 지표 (FQ3-26)
| 지표 | 실제 | 가이던스 | 서프라이즈 | 증감 |
|---|---|---|---|---|
| 매출 | **$5,950M** | $4.4~4.8B | 상단도 +24% | QoQ +97% / YoY +251% |
| 비GAAP 총마진 | **78.4%** | 65~67% | +11%p+ | — |
| 영업이익(GAAP) | $4,111M | — | — | 영업이익률 69% |
| 비GAAP EPS | **$23.41** | $12~14 | +67%+ | — |
| GAAP EPS(희석) | $23.03 | — | — | 순이익 $3,615M |

> 출처: SanDisk IR / stockanalysis.com. 가이던스 대비 비교(애널리스트 컨센서스는 가이던스와 유사 수준으로 (추정)).

## 3. 가이던스 (FQ4-26)
| 항목 | 가이던스 | 구분 | 비고 |
|---|---|---|---|
| FQ4-26 매출 | **$7.75~8.25B** | 수치 | QoQ 또 +30%대 |
| FQ4-26 총마진(비GAAP) | **79~81%** | 수치 | 마진 추가 확장 전망 |
| FY2027 공급 | 비트 1/3 이상 계약 고정 | 정성 | 데이터센터 수요 가속 |

→ 투자자 입장에서 의미: <mark>QoQ +97% 다음 분기에 또 +30%대를 제시한 건 '사이클 정점' 우려를 정면으로 반박하는 시그널.</mark> 다만 NAND는 DRAM보다 변동성이 큰 시장이라, $42B 수주잔고가 '최소가격 기준'이라는 점은 양날의 검(하방은 막아주지만 가격 급등 시 상단도 제한).

## 4. 부문별 실적 (Segment)
| 사업부 | 매출 | 비중 | QoQ | 비고 |
|---|---|---|---|---|
| Edge (클라이언트·모바일) | $3,663M | 62% | +118% | 일반 NAND 가격 급등 |
| Datacenter (엔터프라이즈 SSD) | $1,467M | 25% | **+233%** | TLC·AI 워크로드, QLC Stargate 대기 |
| Consumer (리테일) | $820M | 14% | −10% | 계절적 비수기 |

→ 투자자 입장에서 의미: 데이터센터가 QoQ +233%로 성장의 엔진이지만 아직 비중 25%. <mark>진짜 포인트는 일반 NAND(Edge)까지 QoQ +118%로 동반 급등 — HBM 못 만드는 샌디스크도 'NAND 슈퍼사이클'의 직접 수혜를 받고 있다는 증거.</mark> Consumer −10%는 계절성으로, 데이터센터로 물량을 몰아준 영향도 있다.

## 5. 기타 주요 지표 (현금흐름·재무구조)
| 항목 | 수치 | 비고 |
|---|---|---|
| 잉여현금흐름(FCF, 조정) | **$2.955B** | FCF 마진 49.7% |
| CapEx | 매출 대비 대폭 감소 | 노드 전환 투자 완료(회사 주장) |
| 선결제금 수령 | $400M | 장기계약 관련 |
| 순현금/순부채 | 확인 불가 | 본 자료 미공개 |

→ 투자자 입장에서 의미: <mark>FCF 마진 49.7% — 매출의 절반이 현금으로 떨어진다는 뜻으로, "특별한 현금창출 머신(spectacular cash generator)"이라는 경영진 표현이 과장이 아니다.</mark> 노드 전환 CapEx가 끝나 향후 수년간 투자 부담이 줄어드는 점이 현금흐름의 핵심.

## 6. 주주환원
- **자사주 매입 $60억(만료기한 없음)** 신규 승인. 배당은 미도입(이번 분기 발표 없음).

→ 투자자 입장에서 의미: 2025년 2월 WD에서 분사한 신생 상장사라 배당 대신 **자사주($6B)로 환원**을 택했다. 시총 대비 큰 규모이며, FCF가 강해 실제 매입 여력이 충분하다.

## 7. 경영진이 자신있어하는 부문
- **① 현금창출력** (CEO): "이 사업은 특별한 현금창출 사업. 매출 대비 CapEx가 대폭 줄어드는 국면 진입."
- **② 데이터센터 전환**: 엔터프라이즈 SSD QoQ +233%, TLC 주도 + QLC 'Stargate' 출시 준비.
- **③ 장기계약 구조화**: 5건·금융보증 $11B·신규 3건 $42B 수주잔고 → 가격·물량 가시성 확보.

## 8. 리스크로 고려해야 할 부문
- **NAND 사이클 변동성**: NAND는 DRAM보다 가격 변동이 큰 시장. 현 마진(78%)은 역사적 고점 구간.
- **밸류에이션 부담**: 주가가 2026년 들어 약 +500% 급등 — 실적 둔화 시 조정 폭이 클 수 있음.
- **분사 직후 짧은 트랙레코드**: 2025/2 WD 분사 → 독립 경영 이력이 짧다.
- **수주잔고의 성격**: $42B는 '최소' 기준의 회사 주장치 → 실제는 상·하방 모두 열려 있음.

---
**출처**: SanDisk IR(FY26 Q3), stockanalysis.com, Seeking Alpha, semiconalpha, TIKR
**작성**: 2026-06-28 · stock-report

# SK하이닉스(000660) | 분기 매출 첫 50조 돌파, 영업이익 37.6조·영업이익률 72% '사상 최대'
### 2026년 1분기 실적 (2026-04-23 발표)

## 세줄 요약
1. <mark>매출 **52.6조원**으로 분기 사상 첫 50조 돌파, 영업이익 **37.6조원**·영업이익률 **72%** 창사 이래 최고.</mark>
2. 컨센서스(매출 50.5조·영업익 35.8조)를 모두 상회, 순이익은 **40.3조원**으로 영업이익을 초과(영업외 이익 반영).
3. AI(에이전틱 AI) 수요 확산으로 HBM·서버 DRAM·eSSD 동반 강세, 순현금 **35조원**으로 재무 체력 역대급.

---

## 1. Key Takeaways (핵심 요약)
- **전 항목 컨센 Beat.** 매출 **52.6조원** vs 컨센 ~50.5조(**+4%**), 영업이익 **37.6조원** vs 컨센 ~35.8조(**+5%**), 순이익 **40.3조원** vs 컨센 ~28.1조(**+44%**).
- **사상 최대 경신.** 분기 매출 첫 50조 돌파, 영업이익·영업이익률(72%) 모두 창사 이래 최고. QoQ 매출 +60%·영업익 +96%, YoY 매출 +198%·영업익 +405%.
- **순이익 > 영업이익.** 순이익률 77%로 영업이익률(72%)을 상회 — 영업외(지분법·환·평가 등) 이익이 크게 반영된 구조(주의 포인트).
- **재무 체력.** 현금성자산 **54.3조원**(+19.4조 QoQ), 차입금 19.3조(−2.9조 QoQ), 순현금 **35조원**.

## 2. 주요 실적 지표 (2026 1Q)
| 지표 | 실제 | 컨센서스 | 서프라이즈 | 증감 |
|---|---|---|---|---|
| 매출 | **52조 5,763억** | ~50.5조 | +4% | QoQ +60% / YoY +198% |
| 영업이익 | **37조 6,103억** | ~35.8조 | +5% | QoQ +96% / YoY +405% |
| 영업이익률 | **72%** | — | — | 창사 최고 |
| 순이익 | **40조 3,459억** | ~28.1조 | **+44%** | 순이익률 77% |

> 출처: SK하이닉스 IR, 컨퍼런스콜. *외부감사 진행 중으로 수치 변동 가능.*

## 3. 가이던스 / 시황 전망
| 항목 | 내용 | 구분 |
|---|---|---|
| 수요 전망 | 에이전틱 AI 전환 → HBM·고용량 서버 DRAM·eSSD 수요 폭넓게 확산 | 정성 |
| 공급 전략 | "구조적 AI 수요에 대응하는 **공급능력 확보**가 경쟁력의 핵심" | 정성 |
| 2026 CapEx | YoY 대폭 증가 — M15X 가동, 용인 클러스터, EUV 투자 (구체 수치 미제시) | 정성 |
| 제품 로드맵 | 192GB SOCAMM2(10나노 6세대) 이달 양산, 321단 QLC cSSD 출시 | 수치 |

→ 투자자 입장에서 의미: <mark>구체 매출 가이던스 대신 "공급능력 확보가 경쟁력"이라고 못 박은 건, 수요가 아니라 '얼마나 만들 수 있나'가 승부처라는 자신감.</mark> 다만 CapEx가 YoY 대폭 증가 → 단기 현금흐름엔 부담, 장기 공급능력엔 투자다.

## 4. 부문별 동향 (DRAM / NAND)
| 부문 | 동향 | 비고 |
|---|---|---|
| DRAM | HBM·고용량 서버 모듈 중심 고부가 확대 | SOCAMM2 192GB 양산 개시 |
| NAND | eSSD(기업용) 라인업 확대 | 321단 QLC cSSD 출시 |

> 회사는 이번 실적발표에서 **부문별 매출액 분리 수치는 미공개**. HBM 점유율·비중 구체 수치도 본 자료엔 없음(확인 불가).

→ 투자자 입장에서 의미: <mark>HBM·서버 DRAM·eSSD 같은 '고부가 제품'으로 믹스가 쏠리면서 가격·마진이 동시에 뛴 게 72% 영업이익률의 핵심.</mark> 범용보다 AI 메모리 비중이 실적을 좌우하는 구조.

## 5. 기타 주요 지표 (현금흐름·재무구조)
| 항목 | 수치 | 비고 |
|---|---|---|
| 현금성자산 | **54조 3,000억** | +19.4조 QoQ |
| 차입금 | 19조 3,000억 | −2.9조 QoQ |
| 순현금 | **35조원** | 현금 54.3조 − 차입 19.3조 |
| 2026 CapEx | YoY 대폭 증가 | 구체 수치 미제시 |
| 재고 | 확인 불가 | 본 자료 미공개 |

→ 투자자 입장에서 의미: 분기 한 번에 현금이 **+19.4조원** 늘고 차입금은 줄었다 = 대규모 CapEx와 주주환원을 동시에 감당할 체력. 순현금 35조원은 메모리 다운사이클 방어막이기도 하다.

## 6. 주주환원
- SK하이닉스 기존 정책은 **고정 분기배당 + 연간 FCF 연동 환원** 기조(이번 실적발표 자료엔 신규 배당·자사주 수치 별도 명시 없음 → 확인 필요).
- 참고로 임직원 성과급(PS) 확대가 화제였으나 이는 주주환원이 아닌 인건비 항목.

→ 투자자 입장에서 의미: <mark>역대급 이익에도 자료상 주주환원 '신규' 발표는 두드러지지 않았다.</mark> 늘어난 현금이 환원 확대로 이어질지, CapEx로 재투입될지가 향후 관전 포인트.

## 7. 경영진이 자신있어하는 부문
- **① HBM 실행력**: 성능·수율·품질·공급안정성 전반의 실행력 강화.
- **② 공급능력**: "구조적 AI 수요에 대응하는 공급능력 확보가 경쟁력의 핵심" — 증설(M15X·용인) 자신감.

<script>
let REPORTS = [];
const $list = document.getElementById('list');
const $report = document.getElementById('report');
const $search = document.getElementById('search');
const $count = document.getElementById('count');

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderList(items){
  $count.textContent = `${items.length}개 리포트`;
  if(!items.length){
    $list.innerHTML = '<div class="empty" style="padding:24px 8px">검색 결과가 없습니다.</div>';
    return;
  }
  $list.innerHTML = items.map((r,i)=>`
    <div class="card" data-file="${esc(r.file)}">
      <div class="top">
        <span class="tk">${esc(r.ticker||'')}</span>
        <span class="badge ${r.market==='KR'?'KR':'US'}">${r.market==='KR'?'KR':'US'}</span>
        ${r.type==='preview'?'<span class="type-badge preview">프리뷰</span>':r.type==='review'?'<span class="type-badge review">리뷰</span>':''}
      </div>
      <div class="co">${esc(r.company||'')}</div>
      <div class="hl">${esc(r.headline||'')}</div>
      <div class="dt">${esc(r.period||r.date||'')}</div>
    </div>`).join('');
  [...$list.querySelectorAll('.card')].forEach(c=>{
    c.onclick=()=>openReport(c.dataset.file, c, true);
    refreshCardDot(c.dataset.file);
  });
}

async function openReport(file, cardEl, scroll){
  currentFile = file;
  memoSync();
  [...$list.querySelectorAll('.card')].forEach(c=>c.classList.remove('active'));
  if(cardEl) cardEl.classList.add('active');
  $report.innerHTML = '<div class="empty">불러오는 중…</div>';
  try{
    let md;
    if(window.EMBEDDED && window.EMBEDDED.content && (file in window.EMBEDDED.content)){
      md = window.EMBEDDED.content[file];           // 오프라인(dashboard.html) 모드
    } else {
      const res = await fetch('reports/'+file, {cache:'no-store'});
      if(!res.ok) throw new Error(res.status);
      md = await res.text();
    }
    const html = (window.DOMPurify ? DOMPurify.sanitize(marked.parse(md), {ADD_TAGS:['mark']}) : marked.parse(md));
    $report.innerHTML = html;
    if(scroll) $report.scrollIntoView({behavior:'smooth', block:'start'});
    const tk = (REPORTS.find(r=>r.file===file)||{}).ticker;
    if(tk) history.replaceState(null,'','#'+tk);
  }catch(e){
    $report.innerHTML = '<div class="empty">리포트를 불러오지 못했습니다 ('+esc(String(e))+')</div>';
  }
}

let typeFilter = 'all';
function applyFilter(){
  const q = $search.value.trim().toLowerCase();
  let f = REPORTS;
  if(typeFilter !== 'all') f = f.filter(r => (r.type||'earnings') === typeFilter);
  if(q) f = f.filter(r =>
    (r.ticker||'').toLowerCase().includes(q) ||
    (r.company||'').toLowerCase().includes(q) ||
    (r.headline||'').toLowerCase().includes(q));
  if(f.length){ renderList(f); return; }
  // 결과 없음
  $count.textContent = '0개 리포트';
  if(q){
    $list.innerHTML = `<div class="empty" style="padding:28px 10px">
      '<b>${esc($search.value.trim())}</b>' 리포트가 아직 없어요.<br><br>
      Claude Code에서<br><code>/stock-report ${esc($search.value.trim())}</code><br>로 생성한 뒤 push 하세요.</div>`;
  } else {
    const label = {earnings:'실적', preview:'프리뷰', review:'리뷰'}[typeFilter] || '';
    $list.innerHTML = `<div class="empty" style="padding:28px 10px">'${label}' 분류의 리포트가 아직 없어요.</div>`;
  }
}

$search.addEventListener('input', applyFilter);
document.querySelectorAll('.fchip').forEach(c => c.addEventListener('click', ()=>{
  typeFilter = c.dataset.type;
  document.querySelectorAll('.fchip').forEach(x => x.classList.toggle('on', x===c));
  applyFilter();
}));

/* ===== 투자 메모 ===== */
const MEMO_NS = 'yellini.memo.';
let currentFile = null;
let memoTab = 'stock';
const $memoBtn = document.getElementById('memoBtn');
const $drawer  = document.getElementById('memoDrawer');
const $overlay = document.getElementById('memoOverlay');
const $memoClose = document.getElementById('memoClose');
const $ta = document.getElementById('memoTa');
const $ctx = document.getElementById('memoCtx');
const $status = document.getElementById('memoStatus');

function lsGet(k){ try{ return localStorage.getItem(k)||''; }catch(e){ return ''; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }
function hasMemo(file){ return !!lsGet(MEMO_NS+file).trim(); }

function refreshCardDot(file){
  const card = [...$list.querySelectorAll('.card')].find(c=>c.dataset.file===file);
  if(!card) return;
  let dot = card.querySelector('.memo-dot');
  if(hasMemo(file)){
    if(!dot){ dot=document.createElement('span'); dot.className='memo-dot'; dot.textContent='📌';
      dot.title='메모 있음'; card.querySelector('.top').appendChild(dot); }
  } else if(dot){ dot.remove(); }
}

function memoKey(){
  if(memoTab==='free') return MEMO_NS+'__free';
  return currentFile ? MEMO_NS+currentFile : null;
}
function loadMemo(){
  if(memoTab==='free'){
    $ctx.innerHTML = '종목과 무관한 자유 메모장';
    $ta.disabled=false; $ta.value=lsGet(MEMO_NS+'__free');
  } else if(currentFile){
    const r = REPORTS.find(x=>x.file===currentFile)||{};
    $ctx.innerHTML = '<b>'+esc(r.ticker||'')+'</b> · '+esc(r.company||'');
    $ta.disabled=false; $ta.value=lsGet(MEMO_NS+currentFile);
  } else {
    $ctx.textContent = '먼저 리포트를 선택하면 종목 메모를 적을 수 있어요.';
    $ta.disabled=true; $ta.value='';
  }
  $status.textContent = $ta.value ? '저장됨' : '';
}
let saveTimer=null;
function onMemoInput(){
  const key = memoKey(); if(!key) return;
  $status.textContent='입력 중…';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    lsSet(key,$ta.value);
    const d=new Date();
    $status.textContent='저장됨 · '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    if(memoTab==='stock' && currentFile) refreshCardDot(currentFile);
  },350);
}
function setTab(t){
  memoTab=t;
  [...$drawer.querySelectorAll('.memo-tab')].forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  loadMemo();
}
function openDrawer(){
  $drawer.classList.add('open'); $overlay.classList.add('open'); $drawer.setAttribute('aria-hidden','false');
  loadMemo(); setTimeout(()=>{ if(!$ta.disabled) $ta.focus(); },220);
}
function closeDrawer(){
  $drawer.classList.remove('open'); $overlay.classList.remove('open'); $drawer.setAttribute('aria-hidden','true');
}
function memoSync(){ if($drawer.classList.contains('open') && memoTab==='stock') loadMemo(); }

$memoBtn.addEventListener('click', openDrawer);
$memoClose.addEventListener('click', closeDrawer);
$overlay.addEventListener('click', closeDrawer);
$ta.addEventListener('input', onMemoInput);
[...$drawer.querySelectorAll('.memo-tab')].forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeDrawer();
  if(e.altKey && (e.key==='m'||e.key==='M')){ e.preventDefault();
    $drawer.classList.contains('open')?closeDrawer():openDrawer(); }
});

/* ===== 탭 + 실적 캘린더 ===== */
let EARNINGS = null;
const $calList = document.getElementById('calList');
const $calNote = document.getElementById('calNote');

function switchView(v){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('on', b.dataset.view===v));
  document.getElementById('view-reports').classList.toggle('on', v==='reports');
  document.getElementById('view-calendar').classList.toggle('on', v==='calendar');
  document.getElementById('view-sectors').classList.toggle('on', v==='sectors');
}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchView(b.dataset.view)));

function dday(dateStr){
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(dateStr+'T00:00:00');
  const diff=Math.round((d-today)/86400000);
  if(diff===0) return 'D-DAY';
  return diff>0 ? ('D-'+diff) : ('D+'+(-diff));
}
function findReport(ticker,type){ return REPORTS.find(r=>r.ticker===ticker && r.type===type); }

function renderCalendar(){
  if(!EARNINGS || !EARNINGS.events){ $calList.innerHTML='<div class="empty">일정 데이터를 불러오지 못했습니다.</div>'; return; }
  $calNote.textContent = '📅 '+(EARNINGS.updated||'')+' 기준 · '+(EARNINGS.note||'');
  const evs = EARNINGS.events.slice().sort((a,b)=> a.date<b.date?-1:(a.date>b.date?1:0));
  $calList.innerHTML = evs.map(function(e){
    const dd=dday(e.date);
    const soon=/^D-[0-3]$|^D-DAY$/.test(dd);
    const pv=findReport(e.ticker,'preview'), rv=findReport(e.ticker,'review');
    const conf=e.confirmed?'<span class="chip confirmed">확정</span>':'<span class="chip tentative">예정</span>';
    let links='';
    links += pv?('<span class="cal-link" data-file="'+esc(pv.file)+'">📝 프리뷰</span>'):'<span class="cal-link disabled">프리뷰 D-3 예정</span>';
    links += rv?('<span class="cal-link" data-file="'+esc(rv.file)+'">📊 리뷰</span>'):'<span class="cal-link disabled">리뷰 D+1 예정</span>';
    return '<div class="cal-row'+(soon?' soon':'')+'">'
      +'<div class="cal-dday">'+dd+'</div>'
      +'<div class="cal-main"><div class="nm">'+esc(e.ticker)+' <span class="badge '+(e.market==='KR'?'KR':'US')+'">'+(e.market==='KR'?'KR':'US')+'</span> '+conf+'</div>'
      +'<div class="sub">'+esc(e.company||'')+' · '+esc(e.quarter||'')+'</div>'
      +'<div class="cal-links">'+links+'</div></div>'
      +'<div class="cal-date">'+esc(e.date)+'</div></div>';
  }).join('');
  [...$calList.querySelectorAll('.cal-link[data-file]')].forEach(a=>{
    a.onclick=()=>{ switchView('reports'); const card=[...$list.querySelectorAll('.card')].find(c=>c.dataset.file===a.dataset.file); openReport(a.dataset.file,card,true); };
  });
}

async function loadEarnings(){
  if(window.EMBEDDED && window.EMBEDDED.earnings){ EARNINGS=window.EMBEDDED.earnings; return; }
  try{ const r=await fetch('reports/earnings.json',{cache:'no-store'}); EARNINGS=await r.json(); }catch(e){ EARNINGS=null; }
}

/* ===== 섹터 뷰 ===== */
let SECTORS = null;
const $secList = document.getElementById('secList');
const $secNote = document.getElementById('secNote');
function sentClass(s){ return s==='긍정'?'pos':(s==='부정'?'neg':'neu'); }
function renderSectors(){
  if(!SECTORS || !SECTORS.sectors){ $secList.innerHTML='<div class="empty">섹터 데이터를 불러오지 못했습니다.</div>'; return; }
  $secNote.textContent = '🔭 '+(SECTORS.updated||'')+' 기준 · '+(SECTORS.cycle||'')+' 업데이트 · '+(SECTORS.note||'');
  $secList.innerHTML = SECTORS.sectors.map(function(s){
    const tickers=(s.tickers||[]).map(function(t){
      const rep=REPORTS.find(r=>r.ticker===t && (r.type==='earnings'||!r.type));
      return rep ? '<span class="sec-tk" data-file="'+esc(rep.file)+'">'+esc(t)+'</span>'
                 : '<span class="sec-tk" style="cursor:default;opacity:.7">'+esc(t)+'</span>';
    }).join('');
    const bull=(s.bull||[]).map(x=>'<li>'+esc(x)+'</li>').join('');
    const bear=(s.bear||[]).map(x=>'<li>'+esc(x)+'</li>').join('');
    return '<div class="sec-card"><div class="sec-head">'
      +'<span class="nm">'+esc(s.name)+'</span>'
      +'<span class="sent '+sentClass(s.sentiment)+'">'+esc(s.sentiment||'')+'</span>'
      +'<span class="sec-tickers">'+tickers+'</span></div>'
      +'<div class="sec-summary">'+esc(s.summary||'')+'</div>'
      +'<div class="sec-split">'
      +'<div class="sec-col good"><h4>👍 좋은 뷰</h4><ul>'+bull+'</ul></div>'
      +'<div class="sec-col bad"><h4>👎 나쁜 뷰</h4><ul>'+bear+'</ul></div>'
      +'</div></div>';
  }).join('');
  [...$secList.querySelectorAll('.sec-tk[data-file]')].forEach(a=>{
    a.onclick=()=>{ switchView('reports'); const card=[...$list.querySelectorAll('.card')].find(c=>c.dataset.file===a.dataset.file); openReport(a.dataset.file,card,true); };
  });
}
async function loadSectors(){
  if(window.EMBEDDED && window.EMBEDDED.sectors){ SECTORS=window.EMBEDDED.sectors; return; }
  try{ const r=await fetch('reports/sectors.json',{cache:'no-store'}); SECTORS=await r.json(); }catch(e){ SECTORS=null; }
}

(async function init(){
  if(window.EMBEDDED && window.EMBEDDED.manifest){
    REPORTS = window.EMBEDDED.manifest.reports || [];   // 오프라인(dashboard.html) 모드
  } else {
    try{
      const res = await fetch('reports/manifest.json', {cache:'no-store'});
      const data = await res.json();
      REPORTS = data.reports || [];
    }catch(e){
      $list.innerHTML = '<div class="empty">manifest.json을 불러오지 못했습니다.<br>build_manifest.ps1을 실행했는지 확인하세요.</div>';
      return;
    }
  }
  renderList(REPORTS);
  await loadEarnings();
  renderCalendar();
  await loadSectors();
  renderSectors();
  // deep link: #MU
  const tk = decodeURIComponent(location.hash.replace('#','')).toLowerCase();
  if(tk){
    const hit = REPORTS.find(r=>(r.ticker||'').toLowerCase()===tk);
    if(hit){
      const card = [...$list.querySelectorAll('.card')].find(c=>c.dataset.file===hit.file);
      openReport(hit.file, card);
    }
  } else if(REPORTS.length){
    openReport(REPORTS[0].file, $list.querySelector('.card'));
  }
})();
</script>
</body>
</html>
